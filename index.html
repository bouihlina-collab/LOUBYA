<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You Restaurant</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

h1 {
  padding: 20px;
}

.menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card h3 {
  margin-bottom: 10px;
}

/* Chat button (optional visual trigger) */
#chat-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>For You Restaurant 🍔</h1>

<div class="menu">

  <div class="card">
    <h3>Burgers</h3>
    <p>Classic Burger - 50 MAD</p>
    <p>Double Cheese Burger - 65 MAD</p>
  </div>

  <div class="card">
    <h3>Fries</h3>
    <p>Loaded Fries - 30 MAD</p>
    <p>Crunch Fries - 60 MAD</p>
  </div>

  <div class="card">
    <h3>Sushi</h3>
    <p>California Roll - 35 MAD</p>
    <p>Dragon Eye - 45 MAD</p>
  </div>

  <div class="card">
    <h3>Combos</h3>
    <p>For You Combo - 100 MAD</p>
    <p>LA Combo - 85 MAD</p>
  </div>

  <div class="card">
    <h3>Drinks</h3>
    <p>Milkshake - 35 MAD</p>
    <p>Mojito - 25 MAD</p>
  </div>

</div>

<div id="chat-toggle">Chat 💬</div>

<!-- BOTPRESS (CORRECT FINAL VERSION) -->
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/05/02/21/20260502210550-AFUGXX76.js" defer></script>

<script>
// Simulated user data
const orders = ["Classic Burger", "Loaded Fries", "Coca Cola"];
const analytics = {
  favoriteCategory: "Burgers",
  avgSpend: 80
};

localStorage.setItem("orders", JSON.stringify(orders));
localStorage.setItem("analytics", JSON.stringify(analytics));

// Optional button to open chat
document.getElementById("chat-toggle").onclick = () => {
  if (window.botpressWebChat) {
    window.botpressWebChat.sendEvent({ type: "show" });
  }
};
</script>

</body>
</html>
