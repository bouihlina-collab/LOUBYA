<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You Restaurant</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 0; }
    .chat-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    .input input {
      flex: 1;
      padding: 10px;
      border: none;
    }
    .input button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<h1 style="padding:20px;">For You Restaurant 🍔</h1>

<div class="chat-box">
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="userInput" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const orders = [
    "Classic Burger",
    "Loaded Fries",
    "Coca Cola"
  ];

  const analytics = {
    favoriteCategory: "Burgers",
    avgSpend: 80
  };

  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("analytics", JSON.stringify(analytics));

  const storedOrders = JSON.parse(localStorage.getItem("orders")) || [];
  const storedAnalytics = JSON.parse(localStorage.getItem("analytics")) || {};

  const userContext = `
User order history: ${storedOrders.join(", ")}
Favorite category: ${storedAnalytics.favoriteCategory}
Average spend: ${storedAnalytics.avgSpend} MAD
  `;

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.innerText = text;
    div.style.margin = "5px";
    div.style.padding = "8px";
    div.style.borderRadius = "10px";
    div.style.background = sender === "user" ? "#000" : "#eee";
    div.style.color = sender === "user" ? "#fff" : "#000";
    document.getElementById("messages").appendChild(div);
  }

  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value;

    addMessage(text, "user");

    setTimeout(() => {
      addMessage(
        "Since you like burgers, I recommend a premium sandwich + loaded fries 🔥",
        "bot"
      );
    }, 500);

    input.value = "";
  }

  console.log("User Context:", userContext);
</script>

</body>
</html>
